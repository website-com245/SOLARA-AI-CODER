/* glitch text */
.glitch {
    position: relative;
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    width: 100%;
    overflow: hidden;
}

.glitch::before {
    animation: glitchTop 1.5s infinite linear;
    color: #00d4ff;
    top: -2px;
}

.glitch::after {
    animation: glitchBottom 1.5s infinite linear;
    color: #ff00c8;

}

}

    50% { transform: translate(2px); }

}

        let generatedCode = null;

        async function generateCode() {
            const input = document.getElementById('promptInput');
            const prompt = input.value.trim();
            const btn = document.getElementById('generateBtn');

            if (!prompt) {
                input.focus();
                return showNotification('Please enter a project description', 'error');
            }

            // Show loading
            showLoading();
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';

            try {
                const code = await callGroqAPI(prompt);
                generatedCode = code;
                
                showOutput(code);
                updateStatus('success', '✅ Code generated successfully!', 'Code ready for production');
                
            } catch (error) {
                console.error('Generation error:', error);
                updateStatus('error', '❌ Generation failed', error.message || 'Unknown error occurred');
                showErrorState();
            } finally {
                // Reset button only if input section is visible
                if (document.getElementById('inputSection').style.display !== 'none') {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sparkles"></i> Generate Code';
                }
            }
        }

        async function callGroqAPI(prompt) {
            // ⚠️ REPLACE WITH YOUR GROQ API KEY
            const API_KEY = "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";
            
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.1-8b-instant',
                    messages: [{
                        role: 'user',
                        content: `Generate complete, production-ready web project files.

FORMAT (exactly):
--- filename.ext ---
[complete file content]

--- filename2.ext ---
[complete file content]

Project: ${prompt}

RULES:
- Return ONLY files in exact format above
- No explanations, no markdown, no extra text
- Make files production-ready and complete
- Include all HTML, CSS, JS needed`
                    }],
                    max_tokens: 4000,
                    temperature: 0.3
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                console.error('API Error Details:', errorText);
                throw new Error(`API Error ${response.status}: ${errorText.slice(0, 100)}...`);
            }

            const data = await response.json();
            if (!data.choices?.[0]?.message?.content) {
                throw new Error('No code generated by AI');
            }
            
            return cleanOutput(data.choices[0].message.content);
        }

        function cleanOutput(text) {
            return text
                // Remove markdown code blocks
                .replace(/```[\s\S]*?```/g, '')
                // Remove everything before first file
                .replace(/^[\s\S]*?(?=---\s*[^-\s]+\.[a-zA-Z0-9]+(\s*---|$))/i, '')
                .trim();
        }

        function extractFiles(code) {
            const files = {};
            // Improved regex for file extraction
            const regex = /---\s*([^\s\-]+?\.[a-zA-Z0-9]+)\s*---\s*([\s\S]*?)(?=(?:---\s*[^\s\-]+?\.[a-zA-Z0-9]+\s*---)|$)/g;
            let match;
            
            while ((match = regex.exec(code)) !== null) {
                const filename = match[1].trim();
                const content = match[2].replace(/^\n+|\n+$/g, '').trim();
                if (filename && content) {
                    files[filename] = content;
                }
            }
            
            return files;
        }

        function showLoading() {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('outputSection').classList.add('show');
            document.getElementById('outputSection').innerHTML = `
                <div class="output-card">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div class="loading-text">Generating your code...</div>
                        <div class="loading-subtext">AI is building your project</div>
                    </div>
                </div>
            `;
        }

        function showOutput(code) {
            const escapedCode = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            
            const outputSection = document.getElementById('outputSection');
            outputSection.innerHTML = `
                <div class="output-card">
                    <div class="status" id="status"></div>
                    <div class="code-preview">
                        <pre><code id="codeOutput">${escapedCode}</code></pre>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="copyCode()">
                            <i class="fas fa-copy"></i> Copy All
                        </button>
                        <button class="action-btn" onclick="downloadZip()">
                            <i class="fas fa-download"></i> Download ZIP
                        </button>
                        <button class="action-btn" onclick="newProject()">
                            <i class="fas fa-plus"></i> New Project
                        </button>
                    </div>
                </div>
            `;
            
            // Syntax highlighting
            setTimeout(() => {
                const codeEl = document.getElementById('codeOutput');
                if (codeEl && window.hljs) {
                    hljs.highlightElement(codeEl);
                }
            }, 100);
        }

        function showErrorState() {
            document.getElementById('outputSection').innerHTML = `
                <div class="output-card">
                    <div class="status error" id="status">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>Failed to generate code</div>
                    </div>
                    <div class="action-buttons" style="justify-content: center;">
                        <button class="action-btn" onclick="location.reload()">
                            <i class="fas fa-redo"></i> Try Again
                        </button>
                    </div>
                </div>
            `;
        }

        function updateStatus(type, iconText, message) {
            const status = document.getElementById('status');
            if (!status) return;
            
            const icon = iconText.includes('✅') ? 'check-circle' : 
                        iconText.includes('❌') ? 'exclamation-triangle' : 'info-circle';
            
            status.className = `status ${type}`;
            status.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <div>${message}</div>
            `;
        }

        function copyCode() {
            if (!generatedCode) {
                showNotification('No code to copy', 'error');
                return;
            }
            
            navigator.clipboard.writeText(generatedCode).then(() => {
                const btn = event.target.closest('.action-btn');
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.background = 'rgba(34, 197, 94, 0.2)';
                btn.style.borderColor = 'rgba(34, 197, 94, 0.3)';
                
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                }, 2000);
            }).catch(() => {
                showNotification('Copy failed', 'error');
            });
        }

                async function downloadZip() {
            if (!generatedCode) {
                showNotification('No code to download', 'error');
                return;
            }
            
            try {
                const files = extractFiles(generatedCode);
                if (Object.keys(files).length === 0) {
                    showNotification('No files detected - copying raw output instead', 'warning');
                    navigator.clipboard.writeText(generatedCode);
                    return;
                }
                
                const zip = new JSZip();
                Object.entries(files).forEach(([name, content]) => {
                    zip.file(name, content);
                });
                
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'solara.ai.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showNotification(`${Object.keys(files).length} files downloaded`, 'success');
            } catch (e) {
                showNotification('Download failed: ' + e.message, 'error');
            }
        }
        
        function newProject() {
    
    // 💣 cancel AI request kung meron
    if (window.currentController) {
        window.currentController.abort();
        window.currentController = null;
    }
    
    // reset data
    window.generatedCode = null;
    
    // show loading (para smooth UX)
    showLoading();
    
    // balik sa input after konting delay
    setTimeout(() => {
        document.getElementById('outputSection').classList.remove('show');
        document.getElementById('inputSection').style.display = 'block';
        
        const input = document.getElementById('promptInput');
        if (input) {
            input.value = '';
            input.focus();
        }
        
    }, 300);
}
        
        function showNotification(message, type = 'info') {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px; z-index: 10000;
                background: ${type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#00d4ff'};
                color: white; padding: 1rem 1.5rem; border-radius: 8px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: 500;
                transform: translateX(400px); transition: all 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.style.transform = 'translateX(0)', 100);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }
        
        // Keyboard shortcuts
        document.getElementById('promptInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                generateCode();
            }
        });
        
        // Auto-focus
        window.addEventListener('load', () => {
            document.getElementById('promptInput').focus();
            hljs.highlightAll();
        });
        
        // Prevent context menu on code
        document.addEventListener('contextmenu', (e) => {
            if (e.target.closest('pre')) {
                e.preventDefault();
            }
        });
        setTimeout(() => {
    const splash = document.getElementById("splash");
    
    if (splash) {
        splash.style.opacity = "0";
        splash.style.transition = "0.8s ease";
        
        setTimeout(() => splash.remove(), 800);
    }
    
    // 🎙️ AI VOICE
    
    
}, 3200);

function goToChangelog() {

  showNotification?.(" Opening Change Log...", 1500);

  setTimeout(() => {
    window.location.href = "changelog.html";
  }, 500);
}
