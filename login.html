<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Assistant • Premium Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #00ffcc;
      --secondary: #7c3aed;
      --accent: #ff6b9d;
      --bg: #0a0e1a;
      --card-bg: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
      --text: #e6edf3;
      --text-muted: #9ca3af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ✨ ADVANCED PARTICLE SYSTEM */
    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* 🌌 ENHANCED GLOW ORBS */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 12s infinite ease-in-out;
    }

    .orb1 { 
      width: 600px; height: 600px; 
      background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
      top: -200px; left: -200px;
    }

    .orb2 { 
      width: 500px; height: 500px; 
      background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation-delay: 3s;
    }

    .orb3 { 
      width: 400px; height: 400px; 
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      top: 50%; right: 10%;
      animation-delay: 6s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      33% { transform: translateY(-30px) scale(1.05); }
      66% { transform: translateY(20px) scale(0.95); }
    }

    /* 🧊 PREMIUM LOGIN CARD */
    .card {
      position: relative;
      z-index: 3;
      width: 420px;
      max-width: 95vw;
      padding: 48px 40px;
      background: linear-gradient(145deg, var(--card-bg), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(25px) saturate(180%);
      text-align: center;
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transition: all 0.4s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    @keyframes slideUp {
      from { 
        transform: translateY(50px) scale(0.95); 
        opacity: 0; 
      }
      to { 
        transform: translateY(0) scale(1); 
        opacity: 1; 
      }
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,255,204,0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 10px 30px rgba(0,255,204,0.3); }
      50% { box-shadow: 0 10px 40px rgba(0,255,204,0.5); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 32px;
      font-weight: 400;
    }

    /* 🚀 PREMIUM BUTTONS */
    .btn-premium {
      width: 100%;
      padding: 16px 24px;
      margin: 8px 0;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    .btn-premium::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn-premium:hover::before {
      left: 100%;
    }

    .btn-google {
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
      box-shadow: 0 10px 30px rgba(66,133,244,0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(66,133,244,0.5);
    }

    .btn-github {
      background: linear-gradient(135deg, #24292e, #39414a);
      color: white;
      box-shadow: 0 10px 30px rgba(36,41,46,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-github:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(36,41,46,0.5);
    }

    /* 🔐 SECURITY BADGE */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
    }

    /* 📱 RESPONSIVE MENU */
    .menu-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 20;
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .menu-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    /* 🛡️ SIDE MENU */
    .side-menu {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100vh;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      backdrop-filter: blur(30px);
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      transition: left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 15;
      color: var(--text);
      overflow-y: auto;
    }

    .side-menu.show {
      left: 0;
    }

    .side-menu h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .side-menu .menu-item {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .side-menu .menu-item:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(8px);
      border-color: var(--primary);
    }

    /* 🌟 LOADING SCREEN */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .loading-screen.show {
      opacity: 1;
      visibility: visible;
    }

    .loader {
      width: 70px;
      height: 70px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 🔔 NOTIFICATIONS */
    .notification {
      position: fixed;
      top: 24px;
      right: -400px;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,255,204,0.3);
      z-index: 25;
      transition: right 0.4s ease;
      font-weight: 500;
    }

    .notification.show {
      right: 24px;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .card {
        width: 95vw;
        padding: 32px 24px;
        margin: 20px;
      }
      
      h1 { font-size: 24px; }
      .subtitle { font-size: 14px; }
    }
    .menu-item {
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 12px 16px;
  margin: 6px 0;

  border-radius: 12px;

  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);

  color: #ffffff;
  font-size: 14px;
  font-family: system-ui, sans-serif;

  cursor: pointer;
  transition: all 0.25s ease;

  backdrop-filter: blur(10px);
}

/* ICON */
.menu-item i {
  color: #00ffcc;
  font-size: 16px;
  min-width: 20px;
  text-align: center;
}

/* 🔥 HOVER EFFECT */
.menu-item:hover {
  background: rgba(0, 255, 204, 0.1);
  border: 1px solid rgba(0, 255, 204, 0.3);

  transform: translateX(6px) scale(1.02);
}

/* ⚡ CLICK EFFECT */
.menu-item:active {
  transform: scale(0.97);
  background: rgba(0, 255, 204, 0.2);
}

/* ✨ OPTIONAL: glowing effect */
.menu-item:hover i {
  text-shadow: 0 0 8px #00ffcc;
}
.menu-item.active {
  background: rgba(0, 255, 204, 0.15);
  border: 1px solid #00ffcc;
}
  </style>
</head>

<body>
  <!-- 🔔 NOTIFICATION -->
  <div id="notification" class="notification">
    <i class="fas fa-check-circle"></i>
    <span id="notification-text"></span>
  </div>

  <!-- 📱 MENU BUTTON -->
  <div class="menu-btn" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>

  <!-- 🎯 PARTICLES CANVAS -->
  <canvas id="particles"></canvas>

  <!-- 🌌 BACKGROUND ORBS -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- 🧊 LOGIN CARD -->
  <div class="card">
    <div class="logo">
      <i class="fas fa-brain" style="font-size: 28px; color: white;"></i>
    </div>
    <h1>AI Assistant</h1>
    <p class="subtitle">Access premium AI features with secure authentication</p>

    <div style="display: flex; flex-direction: column; gap: 12px;">
      <button class="btn-premium btn-google" onclick="loginGoogle()">
        <i class="fab fa-google"></i>
        Continue with Google
      </button>
      
      <button class="btn-premium btn-github" onclick="loginGithub()">
        <i class="fab fa-github"></i>
        Continue with GitHub
      </button>
    </div>

    <div class="security-badge">
      <i class="fas fa-shield-alt"></i>
      100% Secure • End-to-End Encrypted
    </div>
  </div>

  <!-- 🛡️ SIDE MENU -->
  <div id="sideMenu" class="side-menu">
    <h3><i class="fas fa-robot"></i> AI Assistant</h3>
    
    <div class="menu-item" onclick="showAbout()">
      <i class="fas fa-info-circle"></i>
      About Premium AI
    </div>
    
    <div class="menu-item" onclick="showFeatures()">
      <i class="fas fa-star"></i>
      Premium Features
    </div>
    
    <div class="menu-item" onclick="goToChangelog()">
      <i class="fas fa-history"></i>
      What's New
    </div>
    
    <hr style="margin: 24px 0; border: none; height: 1px; background: var(--border);">
    
    <div class="menu-item" onclick="showPrivacy()">
      <i class="fas fa-shield-check"></i>
      Privacy Policy
    </div>
    
    <div class="menu-item" onclick="closeMenu()">
      <i class="fas fa-times"></i>
      Close Menu
    </div>
  </div>

  <!-- 🌟 LOADING SCREEN -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loader"></div>
    <h2 style="margin-top: 24px; color: var(--primary); font-size: 24px; font-weight: 600;">
      Authenticating...
    </h2>
    <p style="margin-top: 12px; opacity: 0.8; font-size: 14px;">
      Secure connection established
    </p>
  </div>

<script type="module">

// 🔥 PARTICLE SYSTEM (FIXED)
class ParticleSystem {
  constructor() {
    this.canvas = document.getElementById('particles');
    if (!this.canvas) return;

    this.ctx = this.canvas.getContext('2d');
    this.particles = [];
    this.resize();
    this.init();

    window.addEventListener('resize', () => this.handleResize());
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }

  handleResize() {
    this.resize();
    this.particles = []; // reset particles
    this.init();
  }

  init() {
    for (let i = 0; i < 80; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        radius: Math.random() * 2 + 1,
        alpha: Math.random() * 0.5 + 0.2,
        color: `hsl(${Math.random() * 60 + 180}, 70%, 60%)`
      });
    }
    this.animate();
  }

  animate() {
    if (!this.ctx) return;

    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

    this.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;

      this.ctx.save();
      this.ctx.globalAlpha = p.alpha;
      this.ctx.fillStyle = p.color;
      this.ctx.shadowBlur = 10;
      this.ctx.shadowColor = p.color;

      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      this.ctx.fill();

      this.ctx.restore();
    });

    requestAnimationFrame(() => this.animate());
  }
}

// init safely
new ParticleSystem();


// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsclSvansz78REWPInXGrwVniz6WEbs2g",
  authDomain: "shab-2838a.firebaseapp.com",
  projectId: "shab-2838a",
  storageBucket: "shab-2838a.firebasestorage.app",
  messagingSenderId: "114359598995",
  appId: "1:114359598995:web:a35377488e5d8f9fff3266",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// 🔔 NOTIFICATION
function showNotification(text, delay = 3000) {
  const notif = document.getElementById('notification');
  const textEl = document.getElementById('notification-text');

  if (!notif || !textEl) return;

  textEl.textContent = text;
  notif.classList.add('show');

  setTimeout(() => notif.classList.remove('show'), delay);
}


// 🚀 LOADING
function showLoading(show = true) {
  const loading = document.getElementById('loadingScreen');
  if (!loading) return;

  loading.classList.toggle('show', show);
}


// 🔐 GOOGLE LOGIN
window.loginGoogle = async function () {
  try {
    showLoading(true);

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("premium_user", JSON.stringify({
      name: user.displayName,
      email: user.email,
      photo: user.photoURL,
      uid: user.uid,
      timestamp: Date.now()
    }));

    showNotification('✅ Welcome!', 2000);

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);

  } catch (err) {
    showLoading(false);
    showNotification('❌ ' + err.message, 4000);
    console.error(err);
  }
};


// 📱 MENU
window.toggleMenu = () => {
  document.getElementById("sideMenu")?.classList.toggle("show");
};

window.closeMenu = () => {
  document.getElementById("sideMenu")?.classList.remove("show");
};


// 🔄 AUTO LOGIN
window.addEventListener('load', () => {
  const user = localStorage.getItem("premium_user");
  if (user) {
    showNotification('👋 Welcome back!', 2000);
    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);
  }
});


// 🎵 INTERACTIVE CARD (FIXED)
const card = document.querySelector('.card');

if (card) {
  document.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = (y - rect.height / 2) / 20;
    const rotateY = (rect.width / 2 - x) / 20;

    card.style.transform =
      `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  document.addEventListener('mouseleave', () => {
    card.style.transform =
      'perspective(1000px) rotateX(0) rotateY(0)';
  });
}


// 💎 PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .catch(err => console.log("SW failed:", err));
}


</script>

</body>
</html>
